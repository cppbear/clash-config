mode: rule
mixed-port: 23333
allow-lan: true
log-level: warning
ipv6: true
unified-delay: true
profile:
  store-selected: true
tcp-concurrent: true
proxy-providers:
  yunanyun:
    type: http
    url:
    path: ./yunanyun.yaml
    proxy: DIRECT
    interval: 3600
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
  fastlink:
    type: http
    url:
    path: ./fastlink.yaml
    proxy: DIRECT
    interval: 3600
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
proxy-groups:
  - name: PROXY
    type: select
    use:
      - yunanyun
      - fastlink
    proxies:
      - ⭐️ Auto
  - name: ⭐️ Auto
    type: url-test
    use:
      - yunanyun
      - fastlink
    url: https://www.gstatic.com/generate_204
    interval: 300
rule-providers:
  myapp:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/cppbear/clash-config/main/ruleset/myapp.yaml
    path: ./ruleset/myapp.yaml
    interval: 43200
  myproxy:
    type: http
    behavior: domain
    url: https://raw.githubusercontent.com/cppbear/clash-config/main/ruleset/myproxy.yaml
    path: ./ruleset/myproxy.yaml
    interval: 43200
  mydirect:
    type: http
    behavior: domain
    url: https://raw.githubusercontent.com/cppbear/clash-config/main/ruleset/mydirect.yaml
    path: ./ruleset/mydirect.yaml
    interval: 43200
  myreject:
    type: http
    behavior: domain
    url: https://raw.githubusercontent.com/cppbear/clash-config/main/ruleset/myreject.yaml
    path: ./ruleset/myreject.yaml
    interval: 43200
  reject:
    type: http
    behavior: domain
    url: https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/reject.txt
    path: ./ruleset/reject.yaml
    interval: 43200
  icloud:
    type: http
    behavior: domain
    url: https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/icloud.txt
    path: ./ruleset/icloud.yaml
    interval: 43200
  apple:
    type: http
    behavior: domain
    url: https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/apple.txt
    path: ./ruleset/apple.yaml
    interval: 43200
  google:
    type: http
    behavior: domain
    url: https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/google.txt
    path: ./ruleset/google.yaml
    interval: 43200
  proxy:
    type: http
    behavior: domain
    url: https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/proxy.txt
    path: ./ruleset/proxy.yaml
    interval: 43200
  direct:
    type: http
    behavior: domain
    url: https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/direct.txt
    path: ./ruleset/direct.yaml
    interval: 43200
  private:
    type: http
    behavior: domain
    url: https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/private.txt
    path: ./ruleset/private.yaml
    interval: 43200
  gfw:
    type: http
    behavior: domain
    url: https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/gfw.txt
    path: ./ruleset/gfw.yaml
    interval: 43200
  greatfire:
    type: http
    behavior: domain
    url: https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/greatfire.txt
    path: ./ruleset/greatfire.yaml
    interval: 43200
  tld-not-cn:
    type: http
    behavior: domain
    url: https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/tld-not-cn.txt
    path: ./ruleset/tld-not-cn.yaml
    interval: 43200
  telegramcidr:
    type: http
    behavior: ipcidr
    url: https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/telegramcidr.txt
    path: ./ruleset/telegramcidr.yaml
    interval: 43200
  cncidr:
    type: http
    behavior: ipcidr
    url: https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/cncidr.txt
    path: ./ruleset/cncidr.yaml
    interval: 43200
  lancidr:
    type: http
    behavior: ipcidr
    url: https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/lancidr.txt
    path: ./ruleset/lancidr.yaml
    interval: 43200
  applications:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/applications.txt
    path: ./ruleset/applications.yaml
    interval: 43200
rules:
  - RULE-SET,myapp,DIRECT
  - DOMAIN,clash.razord.top,DIRECT
  - DOMAIN,yacd.haishan.me,DIRECT
  - RULE-SET,private,DIRECT
  - RULE-SET,myreject,REJECT
  - RULE-SET,reject,REJECT
  - RULE-SET,mydirect,DIRECT
  - RULE-SET,myproxy,PROXY
  - RULE-SET,tld-not-cn,PROXY
  - RULE-SET,gfw,PROXY
  - RULE-SET,greatfire,PROXY
  - RULE-SET,telegramcidr,PROXY
  - MATCH,DIRECT
dns:
  default-nameserver:
    - 119.29.29.29
    - 223.5.5.5
    - 8.8.8.8
    - 1.1.1.1
  direct-nameserver: []
  direct-nameserver-follow-policy: false
  enable: true
  enhanced-mode: fake-ip
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.arpa"
    - time.*.com
    - ntp.*.com
    - time.*.com
    - +.market.xiaomi.com
    - localhost.ptlogin2.qq.com
    - "*.msftncsi.com"
    - www.msftconnecttest.com
  fake-ip-filter-mode: blacklist
  fake-ip-range: 198.18.0.1/16
  fallback:
    - 8.8.8.8
    - 1.1.1.1
  fallback-filter:
    domain:
      - +.google.com
      - +.facebook.com
      - +.youtube.com
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/32
  ipv6: true
  listen: :53
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
    - 8.8.8.8
    - 1.1.1.1
  nameserver-policy:
    +.nju.edu.cn:
      - https://doh.pub/dns-query
      - dns.nju.edu.cn
  prefer-h3: false
  proxy-server-nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  respect-rules: false
  use-hosts: true
  use-system-hosts: true
