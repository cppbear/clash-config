dns:
  default-nameserver:
    - 119.29.29.29
    - 223.5.5.5
    - 8.8.8.8
    - 1.1.1.1
  direct-nameserver: []
  direct-nameserver-follow-policy: false
  enable: true
  enhanced-mode: fake-ip
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.arpa"
    - time.*.com
    - ntp.*.com
    - time.*.com
    - +.market.xiaomi.com
    - localhost.ptlogin2.qq.com
    - "*.msftncsi.com"
    - www.msftconnecttest.com
  fake-ip-filter-mode: blacklist
  fake-ip-range: 198.18.0.1/16
  fallback:
    - 8.8.8.8
    - 1.1.1.1
  fallback-filter:
    domain:
      - +.google.com
      - +.facebook.com
      - +.youtube.com
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/32
  ipv6: true
  listen: :53
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
    - 8.8.8.8
    - 1.1.1.1
  nameserver-policy:
    +.nju.edu.cn:
      - https://doh.pub/dns-query
      - dns.nju.edu.cn
  prefer-h3: false
  proxy-server-nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  respect-rules: false
  use-hosts: true
  use-system-hosts: true
